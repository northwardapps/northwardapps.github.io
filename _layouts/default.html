<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {%- seo -%}
  {%- feed_meta -%}
  <style>
    :root {
      --navy: #1B2B5E;
      --gold: #FFD700;
      --text: #1B2B5E;
      --muted: #5a5a6e;
      --bg: #ffffff;
      --rule: #e5e7ef;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Oxygen, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--navy); text-decoration: underline; text-decoration-color: var(--gold); text-underline-offset: 3px; }
    a:hover { text-decoration-color: var(--navy); }
    h1, h2, h3 { color: var(--navy); line-height: 1.25; }
    h1 { font-size: 1.85rem; margin: 0 0 0.4rem; }
    h2 { font-size: 1.3rem; margin: 1.8rem 0 0.4rem; }
    .site-header {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 16px; padding-bottom: 16px;
      border-bottom: 3px solid var(--gold); margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .site-title { font-weight: 700; color: var(--navy); text-decoration: none; font-size: 1.15rem; }
    .site-nav a { margin-left: 14px; font-size: 0.95rem; }
    .site-nav a:first-child { margin-left: 0; }
    .site-footer {
      margin-top: 60px; padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-size: 0.9rem; color: var(--muted);
    }
    .site-footer a { color: var(--muted); }
    @media (max-width: 480px) {
      body { padding: 18px 16px 40px; }
      h1 { font-size: 1.55rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-title">Northward Apps</a>
    <nav class="site-nav">
      <a href="/blog/">Blog</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/delete-data.html">Data deletion</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>
      © {{ site.time | date: "%Y" }} Northward Apps ·
      <a href="/sitemap.xml">Sitemap</a> ·
      <a href="/feed.xml">RSS</a> ·
      <a href="mailto:christianekjeldsen@gmail.com">Contact</a>
    </p>
  </footer>
</body>
</html>
